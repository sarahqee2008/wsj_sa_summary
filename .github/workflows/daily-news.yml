name: Daily News Update

on:
  schedule:
    # 10:00 AM ET = 15:00 UTC (EST) / 14:00 UTC (EDT)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "Claude version: $(claude --version)"

      - name: Run news update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash update.sh

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "NEWS_UPDATED=false" >> $GITHUB_ENV
          else
            COMMIT_DATE="$(date -u +'%Y-%m-%d')"
            git commit -m "Daily news update: ${COMMIT_DATE}"
            git push
            echo "NEWS_UPDATED=true" >> $GITHUB_ENV
            echo "UPDATE_DATE=${COMMIT_DATE}" >> $GITHUB_ENV
          fi

      - name: Extract top news for email
        if: env.NEWS_UPDATED == 'true'
        run: |
          # Extract first news card from each segment (title, summary, link)
          # Gets up to 9 top stories (one per segment)
          python3 << 'PYEOF'
          import re, html, os

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Find all news cards
          card_pattern = re.compile(
              r'<a\s+href="([^"]+)"[^>]*>.*?'
              r'<div\s+class="title-en">([^<]+)</div>.*?'
              r'<div\s+class="summary-zh">([^<]+)</div>.*?'
              r'<span\s+class="source\s+source-[^"]*">([^<]+)</span>',
              re.DOTALL
          )

          cards = card_pattern.findall(content)

          # Pick top 10 unique articles (dedup by URL)
          seen_urls = set()
          top_news = []
          for url, title, summary, source in cards:
              if url not in seen_urls and len(top_news) < 10:
                  seen_urls.add(url)
                  top_news.append({
                      'url': html.unescape(url),
                      'title': html.unescape(title.strip()),
                      'summary': html.unescape(summary.strip()),
                      'source': html.unescape(source.strip())
                  })

          # Build HTML for email
          news_html = ''
          for i, item in enumerate(top_news, 1):
              source_color = '#588ef0'
              source_icon = '📊'
              if 'Barron' in item['source']:
                  source_color = '#d97706'
                  source_icon = '📈'
              elif 'SA' in item['source']:
                  source_color = '#10b981'
                  source_icon = '💡'
              elif 'Insurer' in item['source']:
                  source_color = '#f59e0b'
                  source_icon = '🛡️'

              news_html += f'''
              <div style="margin-bottom: 12px; padding: 12px 14px; background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%); border-radius: 6px; border-left: 4px solid {source_color}; transition: all 0.2s ease;">
                <div style="display: flex; align-items: flex-start; gap: 10px;">
                  <span style="color: {source_color}; font-weight: bold; font-size: 16px; margin-top: 2px; min-width: 20px;">{i}.</span>
                  <div style="flex: 1;">
                    <a href="{item['url']}" style="color: #1f2937; text-decoration: none; font-size: 13px; font-weight: 600; line-height: 1.5; display: block; margin-bottom: 6px; word-break: break-word;">{item['title']}</a>
                    <p style="color: #6b7280; font-size: 12px; margin: 0; line-height: 1.5; word-break: break-word;">{item['summary']}</p>
                    <div style="margin-top: 6px; display: flex; align-items: center; gap: 8px;">
                      <span style="display: inline-block; background: {source_color}; color: white; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 12px;">{source_icon} {item['source']}</span>
                    </div>
                  </div>
                </div>
              </div>'''

          # Write to env file
          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write('NEWS_HTML<<NEWSEOF\n')
              env_file.write(news_html)
              env_file.write('\nNEWSEOF\n')

          print(f"Extracted {len(top_news)} top news items for email (max 10)")
          PYEOF

      - name: Send email notification
        if: env.NEWS_UPDATED == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Guaiguai News ${{ env.UPDATE_DATE }}"
          to: sarah.qee2008@gmail.com,dyeung4190@gmail.com,xinqi0830@yahoo.com
          from: ${{ secrets.GMAIL_USERNAME }}
          html_body: |
            <div style="font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; max-width: 680px; margin: 0 auto; padding: 0; background: linear-gradient(135deg, #f5f7fa 0%, #f0f3f8 100%);">
              <!-- Header -->
              <div style="background: linear-gradient(135deg, #588ef0 0%, #4b7dd9 100%); padding: 28px 24px; border-radius: 12px 12px 0 0;">
                <h1 style="color: #ffffff; margin: 0 0 8px 0; font-size: 26px; font-weight: 700;">🗞️ Guaiguai News</h1>
                <p style="color: rgba(255,255,255,0.9); font-size: 14px; margin: 0; font-weight: 500;">${{ env.UPDATE_DATE }} · Daily Financial News Briefing</p>
                <p style="color: rgba(255,255,255,0.8); font-size: 12px; margin: 8px 0 0 0;">📊 MarketWatch · 📈 Barron's · 💡 Seeking Alpha · 🛡️ The Insurer</p>
              </div>

              <!-- Main Content -->
              <div style="padding: 28px 24px;">
                <!-- CTA Button -->
                <div style="text-align: center; margin-bottom: 24px;">
                  <a href="https://sarahqee2008.github.io/wsj_sa_summary/"
                     style="background: linear-gradient(135deg, #588ef0 0%, #4b7dd9 100%); color: white; padding: 12px 32px; border-radius: 8px;
                            text-decoration: none; font-weight: 600; font-size: 15px; display: inline-block; box-shadow: 0 4px 12px rgba(88, 142, 240, 0.3); transition: all 0.3s ease;">
                    🚀 查看完整新闻面板 · 实时行情
                  </a>
                </div>

                <!-- Top 10 News Section -->
                <div>
                  <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid rgba(88, 142, 240, 0.2);">
                    <span style="font-size: 20px;">📌</span>
                    <h2 style="color: #1f2937; font-size: 18px; font-weight: 700; margin: 0;">今日要闻 TOP 10</h2>
                    <span style="margin-left: auto; background: #588ef0; color: white; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 12px;">精选</span>
                  </div>

                  ${{ env.NEWS_HTML }}
                </div>

                <!-- Footer Section -->
                <div style="margin-top: 28px; padding-top: 20px; border-top: 2px solid rgba(88, 142, 240, 0.1);">
                  <div style="background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%); padding: 16px; border-radius: 8px; text-align: center;">
                    <p style="color: #6b7280; font-size: 12px; margin: 0 0 8px 0; line-height: 1.6;">
                      💼 <strong>Guaiguai News</strong> · 智能财经资讯 · 每个交易日自动推送<br>
                      实时行情及更多内容，欢迎访问网页版
                    </p>
                    <a href="https://sarahqee2008.github.io/wsj_sa_summary/"
                       style="color: #588ef0; text-decoration: none; font-weight: 600; font-size: 12px;">
                       sarahqee2008.github.io/wsj_sa_summary →
                    </a>
                  </div>

                  <p style="color: #9ca3af; font-size: 10px; text-align: center; margin: 12px 0 0 0; padding: 0;">
                    本邮件由自动化流程生成 · 数据来源于公开市场信息
                  </p>
                </div>
              </div>
            </div>
